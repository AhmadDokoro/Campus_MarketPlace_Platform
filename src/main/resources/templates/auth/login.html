<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link th:href="@{/css/authentication.css}" rel="stylesheet" />

    <!-- Branding overrides moved to /static/css/authentication.css -->
</head>
<body class="login-body">

<div class="login-wrapper">

    <div class="login-card">

        <!-- Left: Form -->
        <div class="login-form-section">
            <h2 class="login-title">Login</h2>

            <form method="post" th:action="@{/signin}" class="login-form">

                <div class="login-input-group">
                    <label for="username">Email</label>
                    <input id="username" type="text" name="email" required>
                </div>

                <div class="login-input-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" required>
                </div>

                <!-- Error message block: only shown when controller adds 'error' to the model -->
                <div th:if="${error}" class="login-error" style="color:#ffdddd;background:#6b1f1f;padding:10px;border-radius:6px;margin-bottom:12px;">
                    <p th:text="${error}" style="margin:0;font-weight:600;"></p>
                </div>

                <button type="submit" class="login-button">Login</button>

                <!-- Sign up prompt: clear button-style link to the signup page -->
                <div style="margin-top:12px;">
                     <a th:href="@{/registerUser}" class="signup-button">Create an account</a>
                </div>

            </form>
        </div>

        <!-- Right: Welcome Panel -->
        <div class="login-welcome-section">
            <h2>WELCOME BACK!</h2>
            <p>Access your marketplace account</p>
        </div>

    </div>

</div>

</body>
</html>
