<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up – Step 1</title>

    <!-- Project stylesheet for authentication pages (served from /static/css) -->
    <link th:href="@{/css/authentication.css}" rel="stylesheet" />

</head>
<body class="signup-body">

<div class="signup-wrapper">
    <div class="signup-card">

        <!-- Header -->
        <div class="signup-header">
            <h1 class="signup-title">Create Your Account</h1>
        </div>

        <form class="signup-form" th:action="@{/signup}" method="post">

            <!-- Section 1: Personal Details -->
            <section class="form-section">
                <h2 class="section-title">Personal Details</h2>

                <div class="form-grid two-col">
                    <div class="form-field">
                        <label for="firstName" class="form-label">First Name</label>
                        <input id="firstName" name="firstName" type="text" placeholder="Ahmad" class="form-input" th:value="${firstName}" />
                    </div>

                    <div class="form-field">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input id="lastName" name="lastName" type="text" placeholder="Dokoro" class="form-input" th:value="${lastName}" />
                    </div>
                </div>
            </section>

            <!-- Section 2: Account Credentials -->
            <section class="form-section">
                <h2 class="section-title">Account Credentials</h2>

                <div class="form-grid two-col">
                    <div class="form-field">
                        <label for="email" class="form-label">Email Address</label>
                        <input id="email" name="email" type="email" placeholder="example@student.umt.edu.my" class="form-input" th:value="${email}" />
                    </div>

                    <div class="form-field">
                        <label for="password" class="form-label">Password</label>
                        <input id="password" name="password" type="password" placeholder="••••••••" class="form-input" />
                    </div>
                </div>
            </section>

            <!-- Section 3: Academic Information -->
            <section class="form-section">
                <h2 class="section-title">Academic Information</h2>

                <div class="form-grid two-col">
                    <div class="form-field">
                        <label for="academicId" class="form-label">Academic ID (Matric / Staff ID)</label>
                        <input id="academicId" name="academicId" type="text" placeholder="here.." class="form-input" th:value="${academicId}" />
                    </div>

                    <div class="form-field">
                        <label for="userRole" class="form-label">User Role</label>
                        <select id="userRole" name="userRole" class="form-select">
                            <option value="">Select role</option>
                            <option value="BUYER" th:selected="${userRole}=='BUYER'">Buying items</option>
                            <option value="SELLER" th:selected="${userRole}=='SELLER'">Start selling</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Section 4: Mentor Information -->
            <section class="form-section">
                <h2 class="section-title">Mentor Information <span class="muted">(Students only)</span></h2>

                <div class="form-grid three-col">
                    <div class="form-field">
                        <label for="level" class="form-label">Level</label>
                        <input id="level" name="level" type="text" placeholder="Year 3" class="form-input" />
                    </div>

                    <div class="form-field">
                        <label for="mentorName" class="form-label">Mentor Name</label>
                        <input id="mentorName" name="mentorName" type="text" placeholder="Dr. John Doe" class="form-input" />
                    </div>

                    <div class="form-field">
                        <label for="mentorEmail" class="form-label">Mentor Email</label>
                        <input id="mentorEmail" name="mentorEmail" type="email" placeholder="mentor@umt.edu.my" class="form-input" />
                    </div>
                </div>
            </section>

            <!-- Action Buttons -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Continue</button>
            </div>

        </form>

    </div>
</div>

</body>
</html>
