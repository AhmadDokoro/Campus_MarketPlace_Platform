<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seller Verification - Campus Marketplace</title>
  <link th:href="@{/css/style.css}" rel="stylesheet">
  <link th:href="@{/css/base.css}" rel="stylesheet">
  <link th:href="@{/css/components.css}" rel="stylesheet">
  <link th:href="@{/css/layout.css}" rel="stylesheet">
  <link th:href="@{/css/responsive.css}" rel="stylesheet">
</head>
<body>
  <header class="py-3 bg-white border-bottom"><div class="container d-flex align-items-center justify-content-between"><a href="../index.html" class="logo text-dark h4 m-0">Campus <span class="text-primary">Market</span></a></div></header>
  <main class="py-5">
    <div class="container">
      <h3>Request Seller Verification</h3>
      <div class="card p-3">
        <form id="verifyForm">
          <div class="form-group">
            <label>Business/Store Name</label>
            <input name="storeName" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Upload ID / Documents</label>
            <input type="file" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Notes</label>
            <textarea name="notes" class="form-control"></textarea>
          </div>
          <button class="btn btn-primary" type="submit">Submit Request</button>
        </form>
      </div>
    </div>
  </main>
  <footer class="py-4 bg-light"><div class="container text-center text-muted">© Campus Marketplace</div></footer>
  <script th:src="@{/js/main.js}"></script>
  <script>
    document.getElementById('verifyForm').addEventListener('submit', function(e){
      e.preventDefault();
      campusMarketplace.showToast('Verification request submitted','success');
    });
  </script>
</body>
</html>
