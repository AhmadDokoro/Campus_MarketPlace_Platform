<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - Campus Marketplace</title>
  <link href="../css/style.css" rel="stylesheet">
  <link href="../static/css/base.css" rel="stylesheet">
  <link href="../static/css/components.css" rel="stylesheet">
  <link href="../static/css/layout.css" rel="stylesheet">
  <link href="../static/css/responsive.css" rel="stylesheet">
</head>
<body>
  <header class="py-3 bg-white border-bottom">
    <div class="container d-flex align-items-center justify-content-between">
      <a href="index.html" class="logo text-dark h4 m-0">Campus <span class="text-primary">Market</span></a>
      <nav>
        <a href="index.html" class="mr-3">Home</a>
        <a href="product/product-list.html" class="mr-3">Shop</a>
      </nav>
    </div>
  </header>

  <main class="py-5">
    <div class="container">
      <h3>Contact Us</h3>
      <div class="card p-3">
        <form id="contactForm">
          <div class="form-group">
            <label>Name</label>
            <input class="form-control" name="name" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input class="form-control" type="email" name="email" required>
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea class="form-control" name="message" rows="5" required></textarea>
          </div>
          <button class="btn btn-primary" type="submit">Send Message</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="py-4 bg-light"><div class="container text-center text-muted">© Campus Marketplace</div></footer>
  <script src="../static/js/main.js"></script>
  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e){
      e.preventDefault();
      campusMarketplace.showToast('Message sent (mock)','success');
      this.reset();
    });
  </script>
</body>
</html>
