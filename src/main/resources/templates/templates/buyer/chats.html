<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chats - Campus Marketplace</title>
  <link href="../../css/style.css" rel="stylesheet">
  <link href="../../static/css/base.css" rel="stylesheet">
  <link href="../../static/css/components.css" rel="stylesheet">
  <link href="../../static/css/layout.css" rel="stylesheet">
  <link href="../../static/css/responsive.css" rel="stylesheet">
</head>
<body>
  <header class="py-3 bg-white border-bottom">
    <div class="container d-flex align-items-center justify-content-between">
      <a href="../index.html" class="logo text-dark h4 m-0">Campus <span class="text-primary">Market</span></a>
    </div>
  </header>

  <main class="py-5">
    <div class="container">
      <div class="row">
        <aside class="col-md-4">
          <div class="list-group">
            <a class="list-group-item list-group-item-action active">John Doe</a>
            <a class="list-group-item list-group-item-action">Seller A</a>
            <a class="list-group-item list-group-item-action">Support</a>
          </div>
        </aside>
        <section class="col-md-8">
          <div class="card p-3 chat-window" style="height:400px;overflow:auto;">
            <div class="mb-3"><strong>John Doe</strong><div class="small text-muted">Online</div></div>
            <div class="mb-2"><div class="badge badge-light p-2">Hi, is this item still available?</div></div>
            <div class="mb-2 text-right"><div class="badge badge-primary p-2">Yes, it's available.</div></div>
          </div>
          <div class="mt-3 d-flex">
            <input class="form-control mr-2" id="chatInput" placeholder="Type a message">
            <button class="btn btn-primary" id="sendChat">Send</button>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="py-4 bg-light"><div class="container text-center text-muted">© Campus Marketplace</div></footer>
  <script src="../../static/js/main.js"></script>
  <script>
    document.getElementById('sendChat').addEventListener('click', ()=>{
      const val = document.getElementById('chatInput').value.trim();
      if(!val) return;
      campusMarketplace.showToast('Message sent','success');
      document.getElementById('chatInput').value = '';
    });
  </script>
</body>
</html>
