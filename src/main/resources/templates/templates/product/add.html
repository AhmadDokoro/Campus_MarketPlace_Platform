<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add Product - Campus Marketplace</title>
  <link th:href="@{/css/style.css}" rel="stylesheet">
  <link th:href="@{/css/base.css}" rel="stylesheet">
  <link th:href="@{/css/components.css}" rel="stylesheet">
  <link th:href="@{/css/layout.css}" rel="stylesheet">
  <link th:href="@{/css/responsive.css}" rel="stylesheet">
</head>
<body>
  <header class="py-3 bg-white border-bottom"><div class="container d-flex align-items-center justify-content-between"><a href="../index.html" class="logo text-dark h4 m-0">Campus <span class="text-primary">Market</span></a></div></header>
  <main class="py-5">
    <div class="container">
      <h3>Add Product</h3>
      <div class="card p-3">
        <form id="addProductForm">
          <div class="form-group">
            <label>Product Name</label>
            <input name="name" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Price (RM)</label>
            <input name="price" type="number" step="0.01" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Category</label>
            <select name="category" class="form-control">
              <option>Electronics</option>
              <option>Books</option>
              <option>Clothing</option>
            </select>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="4"></textarea>
          </div>
          <div class="form-group">
            <label>Images</label>
            <input type="file" name="images" class="form-control" multiple>
          </div>
          <button class="btn btn-primary" type="submit">Add Product</button>
        </form>
      </div>
    </div>
  </main>
  <footer class="py-4 bg-light"><div class="container text-center text-muted">© Campus Marketplace</div></footer>
  <script th:src="@{/js/main.js}"></script>
  <script>
    document.getElementById('addProductForm').addEventListener('submit', function(e){
      e.preventDefault();
      campusMarketplace.showToast('Product added (mock)','success');
      this.reset();
    });
  </script>
</body>
</html>
