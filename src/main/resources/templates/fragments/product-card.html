<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- Product Card Fragment — self-contained, used on every page   -->
<!-- ═══════════════════════════════════════════════════════════════ -->

<div th:fragment="card(p)">

    <!-- Updated New UI Card Styles -->
    <style>
        .pc-card-new {
            --primary: #4B2E83;
            --primary-800: #f5f3ff;
            --primary-shadow: rgba(75, 46, 131, 0.2);
            --text-main: #1f2341;
            --text-muted: #6b7293;
            --bg-linear: linear-gradient(135deg, var(--primary) 0%, #7c52c9 100%);

            position: relative;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 1rem;
            width: 100%;
            /* Pure white with mixture of gold and small purple */
            background: linear-gradient(145deg, #ffffff 0%, #ffffff 50%, rgba(242, 183, 5, 0.15) 85%, rgba(107, 33, 196, 0.1) 100%);
            border-radius: 1rem;
            /* Pyramid lifted shadow effect */
            box-shadow:
                -4px 4px 10px rgba(0, 0, 0, 0.03),
                -8px 8px 20px rgba(75, 46, 131, 0.06),
                -16px 16px 35px rgba(0, 0, 0, 0.04),
                inset 1px -1px 3px rgba(255, 255, 255, 0.9);
            border-right: 1px solid rgba(75, 46, 131, 0.05);
            border-bottom: 1px solid rgba(75, 46, 131, 0.05);
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            overflow: hidden;
        }

        .pc-card-new:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow:
                -6px 6px 15px rgba(0, 0, 0, 0.04),
                -12px 12px 25px rgba(75, 46, 131, 0.1),
                -20px 20px 45px rgba(0, 0, 0, 0.08),
                inset 1px -1px 3px rgba(255, 255, 255, 0.9);
        }

        .pc-card-new .image_container {
            overflow: hidden;
            cursor: pointer;
            position: relative;
            z-index: 5;
            width: 100%;
            height: 12rem;
            border-radius: 0.5rem;
            display: block;
            /* Gradient colored border for the image */
            border: 3px solid transparent;
            background:
                linear-gradient(var(--primary-800), var(--primary-800)) padding-box,
                linear-gradient(135deg, #F2B705 0%, #a95df7 50%, #4B2E83 100%) border-box;
            box-shadow: 0 4px 10px rgba(75, 46, 131, 0.1);
        }

        .pc-card-new .image_container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .pc-card-new:hover .image_container img {
            transform: scale(1.05);
        }

        .pc-card-new .pc-badge-row {
            position: absolute;
            top: 8px;
            left: 8px;
            display: flex;
            gap: 6px;
            z-index: 3;
        }

        .pc-card-new .pc-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .pc-card-new .pc-badge-new { background: rgba(75,46,131,0.9); color: #fff; }
        .pc-card-new .pc-badge-used { background: rgba(255,255,255,0.9); color: #4B2E83; }

        .pc-card-new .pc-category-tag {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary);
            background: rgba(75, 46, 131, 0.08);
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            align-self: flex-start;
            text-transform: uppercase;
        }

        .pc-card-new .title {
            overflow: hidden;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            text-transform: capitalize;
            white-space: nowrap;
            text-overflow: ellipsis;
            text-decoration: none;
            display: block;
        }

        .pc-card-new .title:hover {
            color: var(--primary);
        }

        .pc-card-new .rating-stars {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .pc-card-new .rating-stars i {
            color: #F2B705;
            font-size: 0.8rem;
        }

        .pc-card-new .stock-info {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .pc-card-new .stock-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .pc-card-new .stock-in { background: #10b981; }
        .pc-card-new .stock-low { background: #f59e0b; }
        .pc-card-new .stock-out { background: #ef4444; }

        .pc-card-new .action {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-top: auto;
            position: relative;
        }

        .pc-card-new .price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .pc-card-new .price span.currency {
            font-size: 0.8rem;
            color: var(--primary);
        }

        /* Circular orange cart button (Shopee style) — same look as mobile, scaled up */
        .pc-card-new .cart-button {
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 42px;
            height: 42px;
            min-width: 42px;
            padding: 0;
            background: linear-gradient(135deg, #ff8c00 0%, #ff4e00 100%);
            color: #ffffff;
            border: none;
            border-radius: 50%;
            box-shadow: 0 3px 8px rgba(255, 78, 0, 0.35);
            transition: all 0.2s ease;
        }

        .pc-card-new .cart-button:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 14px rgba(255, 78, 0, 0.5);
        }

        .pc-card-new .cart-button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 4px rgba(255, 78, 0, 0.3);
        }

        .pc-card-new .cart-button.added {
            background: linear-gradient(180deg, #10b981 0%, #059669 100%);
            box-shadow: 0 3px 8px rgba(16, 185, 129, 0.35);
        }

        .pc-card-new .cart-button span {
            display: none;
        }

        .pc-card-new .cart-button .cart-icon {
            width: 19px;
            height: 19px;
        }

        /* Fly-to-cart ghost element.
           !important: pages with `body.cmp-aurora > * { position:relative; z-index:1 }`
           (e.g. the home page) would otherwise drop this body-appended ghost into normal
           flow at the bottom of the page, so the animation never appears. Lock it to the
           viewport, above everything. */
        .fly-to-cart-ghost {
            position: fixed !important;
            z-index: 1000000 !important;
            border-radius: 16px;
            object-fit: cover;
            pointer-events: none;
            box-shadow:
                0 0 0 4px rgba(255, 255, 255, 0.9),
                0 0 30px 8px rgba(255, 140, 0, 0.85),
                0 12px 35px rgba(0, 0, 0, 0.4);
            border: 3px solid #ff8c00;
            background: #fff;
            will-change: transform, opacity;
        }

        /* Cart icon pulse when the flying product lands */
        @keyframes cartLandPulse {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.45); }
            100% { transform: scale(1); }
        }
        .cart-land-pulse {
            animation: cartLandPulse 0.45s ease-out;
            display: inline-block;
        }

        /* ── Mobile Overrides (Shopee Style) ── */
        @media (max-width: 767px) {
            .pc-card-new {
                padding: 0;
                gap: 6px;
                border-radius: 12px;
                background: #ffffff;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
                border: 1px solid rgba(75, 46, 131, 0.08);
            }
            .pc-card-new:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
            }
            .pc-card-new .image_container {
                height: auto;
                aspect-ratio: 1 / 1;
                border: none;
                border-radius: 12px 12px 0 0;
                box-shadow: none;
            }
            .pc-card-new .pc-badge-row {
                top: 6px;
                left: 6px;
                gap: 4px;
            }
            .pc-card-new .pc-badge {
                padding: 2px 5px;
                font-size: 8px;
                border-radius: 4px;
            }
            .pc-card-new .pc-category-tag {
                font-size: 9px;
                padding: 2px 6px;
                margin-left: 8px;
                margin-top: 4px;
                border-radius: 3px;
            }
            .pc-card-new .title {
                font-size: 13px;
                font-weight: 600;
                line-height: 1.3;
                padding: 0 8px;
                white-space: normal;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
                height: 34px;
            }
            .pc-card-new .rating-stars {
                font-size: 10px;
                padding: 0 8px;
                gap: 2px;
            }
            .pc-card-new .rating-stars i {
                font-size: 10px;
            }
            .pc-card-new .stock-info {
                font-size: 10px;
                padding: 0 8px;
                gap: 4px;
            }
            .pc-card-new .stock-dot {
                width: 5px;
                height: 5px;
            }
            .pc-card-new .action {
                padding: 0 8px 8px 8px;
                margin-top: auto;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 4px;
            }
            .pc-card-new .price {
                font-size: 15px;
                color: #ff4e00;
                /* Let the price shrink/truncate before the 40px cart button does */
                min-width: 0;
                overflow: hidden;
                white-space: nowrap;
                text-overflow: ellipsis;
            }
            .pc-card-new .price span.currency {
                font-size: 10px;
                color: #ff4e00;
                font-weight: 700;
            }
            .pc-card-new .cart-button {
                width: 40px;
                height: 40px;
                min-width: 40px;
                flex-shrink: 0;
                padding: 0;
                border-radius: 50%;
                border: none;
                background: linear-gradient(135deg, #ff8c00 0%, #ff4e00 100%);
                box-shadow: 0 2px 5px rgba(255, 78, 0, 0.3);
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .pc-card-new .cart-button:hover {
                transform: scale(1.05);
                box-shadow: 0 3px 8px rgba(255, 78, 0, 0.4);
            }
            .pc-card-new .cart-button span {
                display: none;
            }
            .pc-card-new .cart-button .cart-icon {
                width: 18px;
                height: 18px;
                margin: 0;
                color: #ffffff;
            }
            .pc-card-new .cart-button.added {
                background: linear-gradient(180deg, #10b981 0%, #059669 100%) !important;
                box-shadow: 0 2px 5px rgba(16, 185, 129, 0.3) !important;
            }
        }
    </style>

    <div class="pc-card-new">
        <a class="image_container" th:href="@{/products/{id}(id=${p.productId})}">
            <img th:if="${p.images != null and !#lists.isEmpty(p.images)}" th:src="${@cloudinaryUrlHelper.thumbnail(p.images.get(0).imageUrl)}" alt="Product" loading="lazy">
            <img th:if="${p.images == null or #lists.isEmpty(p.images)}" th:src="@{/img/productplaceholder.png}" alt="Product" loading="lazy">

            <div class="pc-badge-row">
                <span class="pc-badge pc-badge-new" th:if="${p.condition != null and p.condition.name() == 'NEW'}">New</span>
                <span class="pc-badge pc-badge-used" th:if="${p.condition != null and p.condition.name() == 'USED'}">Used</span>
            </div>
        </a>

        <span class="pc-category-tag" th:if="${p.category != null}" th:text="${p.category.categoryName}">Category</span>

        <a class="title" th:href="@{/products/{id}(id=${p.productId})}" th:text="${p.title}">
            Product brand name
        </a>

        <div class="rating-stars">
            <th:block th:with="rd=${@productRatingHelper.getRatingData(p.productId)}, avg=${rd.averageRating()}">
                <i th:class="${avg >= 0.75 ? 'fas fa-star' : (avg >= 0.25 ? 'fas fa-star-half-alt' : 'far fa-star')}"></i>
                <i th:class="${avg >= 1.75 ? 'fas fa-star' : (avg >= 1.25 ? 'fas fa-star-half-alt' : 'far fa-star')}"></i>
                <i th:class="${avg >= 2.75 ? 'fas fa-star' : (avg >= 2.25 ? 'fas fa-star-half-alt' : 'far fa-star')}"></i>
                <i th:class="${avg >= 3.75 ? 'fas fa-star' : (avg >= 3.25 ? 'fas fa-star-half-alt' : 'far fa-star')}"></i>
                <i th:class="${avg >= 4.75 ? 'fas fa-star' : (avg >= 4.25 ? 'fas fa-star-half-alt' : 'far fa-star')}"></i>
                <span th:if="${rd.reviewCount() > 0}" th:text="'(' + ${rd.reviewCount()} + ')'"></span>
            </th:block>
        </div>

        <div class="stock-info" th:if="${p.quantity != null}">
            <div class="stock-dot stock-in" th:if="${p.quantity > 5}"></div>
            <span th:if="${p.quantity > 5}">In Stock</span>
            <div class="stock-dot stock-low" th:if="${p.quantity > 0 and p.quantity <= 5}"></div>
            <span th:if="${p.quantity > 0 and p.quantity <= 5}" th:text="'Only ' + ${p.quantity} + ' left'">Low Stock</span>
            <div class="stock-dot stock-out" th:if="${p.quantity == 0}"></div>
            <span th:if="${p.quantity == 0}">Out of Stock</span>
        </div>

        <div class="action">
            <div class="price">
                <span class="currency">RM</span>
                <span th:text="${#numbers.formatDecimal(p.price, 1, 2)}">0.00</span>
            </div>
            <button class="cart-button" type="button" title="Add to cart"
                    th:data-product-id="${p.productId}"
                    onclick="addToCartFromCard(this)">
                <svg
                    class="cart-icon"
                    stroke="currentColor"
                    stroke-width="1.5"
                    viewBox="0 0 24 24"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                        d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"
                        stroke-linejoin="round"
                        stroke-linecap="round"
                    ></path>
                </svg>
                <span>Add to cart</span>
            </button>
        </div>
    </div>

    <!-- Add to Cart AJAX handler (runs once) -->
    <script>
        if (!window._addToCartCardSetup) {
            window._addToCartCardSetup = true;

            // Animates a small copy of the product image from the card to the header cart icon.
            window.flyProductToCart = function(btn) {
                var card = btn.closest('.pc-card-new');
                if (!card) return;
                var img = card.querySelector('.image_container img');
                if (!img) return;

                // Pick whichever cart icon is actually visible (desktop link or mobile icon).
                var target = null;
                var candidates = document.querySelectorAll('.header-cart-link .header-cart-icon, .mobile-always-cart i, .mob-bottom-nav a[href*="cart" i] i');
                candidates.forEach(function(c) {
                    if (!target && c.offsetParent !== null) target = c;
                });
                if (!target) return;

                var from = img.getBoundingClientRect();
                var to = target.getBoundingClientRect();

                var ghost = document.createElement('img');
                ghost.src = img.currentSrc || img.src;
                ghost.className = 'fly-to-cart-ghost';
                var size = Math.max(70, Math.min(120, from.width * 0.7));
                ghost.style.left = (from.left + from.width / 2 - size / 2) + 'px';
                ghost.style.top = (from.top + from.height / 2 - size / 2) + 'px';
                ghost.style.width = size + 'px';
                ghost.style.height = size + 'px';
                document.body.appendChild(ghost);

                var dx = (to.left + to.width / 2) - (from.left + from.width / 2);
                var dy = (to.top + to.height / 2) - (from.top + from.height / 2);

                // Web Animations API: pop up first, arc toward the cart, stay
                // fully opaque almost the whole way so the flight is obvious.
                var anim = ghost.animate([
                    { transform: 'translate(0px, 0px) scale(1) rotate(0deg)',
                      opacity: 1, offset: 0 },
                    { transform: 'translate(' + (dx * 0.15) + 'px, ' + (dy * 0.15 - 60) + 'px) scale(1.15) rotate(-6deg)',
                      opacity: 1, offset: 0.25 },
                    { transform: 'translate(' + (dx * 0.6) + 'px, ' + (dy * 0.6 - 90) + 'px) scale(0.75) rotate(6deg)',
                      opacity: 1, offset: 0.6 },
                    { transform: 'translate(' + dx + 'px, ' + dy + 'px) scale(0.25) rotate(14deg)',
                      opacity: 0.85, offset: 1 }
                ], { duration: 1100, easing: 'cubic-bezier(0.45, 0, 0.55, 1)', fill: 'forwards' });

                anim.onfinish = function() {
                    ghost.remove();
                    target.classList.remove('cart-land-pulse');
                    void target.offsetWidth;
                    target.classList.add('cart-land-pulse');
                };
            };

            window.addToCartFromCard = function(btn) {
                var productId = btn.getAttribute('data-product-id');
                window.flyProductToCart(btn);
                // Disable button and show spinner.
                btn.disabled = true;
                var originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

                fetch('/cart/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'productId=' + productId + '&quantity=1'
                })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.success) {
                        // Update header cart badge count everywhere.
                        var badges = document.querySelectorAll('.cart-badge-count');
                        badges.forEach(function(b) { b.textContent = data.cartCount; });
                        // Show success checkmark with green glow.
                        btn.classList.add('added');
                        btn.innerHTML = '<i class="fas fa-check"></i>';
                        setTimeout(function() {
                            btn.innerHTML = originalHTML;
                            btn.disabled = false;
                            btn.classList.remove('added');
                        }, 1800);
                    } else if (data.redirect) {
                        // Not logged in — go to login page.
                        window.location.href = data.redirect;
                    } else {
                        alert(data.message || 'Could not add to cart.');
                        btn.innerHTML = originalHTML;
                        btn.disabled = false;
                    }
                })
                .catch(function() {
                    alert('Something went wrong. Please try again.');
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                });
            };
        }
    </script>
</div>
