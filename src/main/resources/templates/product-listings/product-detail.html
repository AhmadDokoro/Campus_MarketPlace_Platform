<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.title} + ' — Campus Marketplace'">Product Detail</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/mobile.css}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(180deg, #f9fafb 0%, #ffffff 45%, #f6f3ff 100%); font-family: 'Poppins', sans-serif; }

        /* ── Breadcrumb ── */
        .breadcrumb-area { background: rgba(75,46,131,0.04); border-bottom: 1px solid rgba(75,46,131,0.08); }
        .breadcrumb-area a { color: #4B2E83; font-weight: 500; }
        .breadcrumb-area a:hover { color: #ffb347; text-decoration: none; }
        .breadcrumb-area .breadcrumb-item.active { color: #6c757d; }

        /* ── Product Image ── */
        .product-detail-img {
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(75,46,131,0.12);
            background: #fff;
        }
        .product-detail-img img {
            width: 100%;
            max-height: 480px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .product-detail-img:hover img { transform: scale(1.03); }

        /* ── Product Info ── */
        .product-info-card {
            background: #fff;
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 12px 32px rgba(17,24,39,0.06);
        }
        .product-detail-title {
            font-size: 26px;
            font-weight: 700;
            color: #2b2b37;
            line-height: 1.3;
        }
        .product-detail-price {
            font-size: 30px;
            font-weight: 800;
            color: #4B2E83;
            margin-top: 10px;
        }
        .badge-condition {
            background: linear-gradient(135deg, #4B2E83 0%, #6e45b7 100%);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 999px;
        }
        .badge-category {
            background: linear-gradient(135deg, #ffb347 0%, #ffcc70 100%);
            color: #3d3d3d;
            font-size: 12px;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 999px;
        }
        .stock-badge {
            font-size: 13px;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 999px;
        }
        .stock-in { background: rgba(40,167,69,0.12); color: #28a745; }
        .stock-low { background: rgba(255,179,71,0.15); color: #e6930a; }
        .stock-out { background: rgba(196,22,28,0.12); color: #C4161C; }

        .product-description {
            color: #555;
            font-size: 15px;
            line-height: 1.75;
            margin-top: 18px;
        }

        /* ── Rating Stars ── */
        .detail-rating { display: flex; gap: 4px; color: #ffb347; font-size: 18px; text-shadow: 0 2px 6px rgba(75,46,131,0.2); }
        .detail-rating i { animation: starPulse 2.4s ease-in-out infinite; }
        .detail-rating i:nth-child(2) { animation-delay: .2s; }
        .detail-rating i:nth-child(3) { animation-delay: .4s; }
        .detail-rating i:nth-child(4) { animation-delay: .6s; }
        .detail-rating i:nth-child(5) { animation-delay: .8s; }
        @keyframes starPulse { 0%,100%{transform:translateY(0);filter:brightness(1)} 50%{transform:translateY(-2px);filter:brightness(1.2)} }

        /* ── Add to Cart Button ── */
        .btn-add-cart {
            background: linear-gradient(135deg, rgba(75,46,131,0.92) 0%, rgba(255,179,71,0.95) 100%);
            color: #fff;
            border: none;
            padding: 14px 36px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 12px 28px rgba(255,179,71,0.35), 0 0 20px rgba(75,46,131,0.25);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            animation: glowPulse 2.5s ease-in-out infinite;
        }
        .btn-add-cart:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 16px 32px rgba(255,179,71,0.45), 0 0 26px rgba(75,46,131,0.35);
            color: #fff;
        }
        @keyframes glowPulse {
            0%,100% { box-shadow: 0 12px 28px rgba(255,179,71,0.35), 0 0 20px rgba(75,46,131,0.25); }
            50% { box-shadow: 0 14px 32px rgba(255,179,71,0.5), 0 0 28px rgba(75,46,131,0.35); }
        }

        /* ── Seller Info Card ── */
        .seller-card {
            background: rgba(75,46,131,0.04);
            border: 1px solid rgba(75,46,131,0.1);
            border-radius: 14px;
            padding: 16px 20px;
            margin-top: 24px;
        }
        .seller-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4B2E83, #ffb347);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
        }
        .seller-name { font-weight: 600; color: #2b2b37; font-size: 15px; }
        .seller-label { font-size: 12px; color: #999; }

        /* ── Info Row (condition, category, stock) ── */
        .info-badges { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; align-items: center; }

        /* ── Divider ── */
        .detail-divider { border-top: 1px solid rgba(75,46,131,0.08); margin: 20px 0; }

        /* ── Related Products ── */
        .related-section-title { display: flex; align-items: center; gap: 10px; }
        .related-section-title i { color: #ffb347; }
        .related-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 20px; }

        @media (max-width: 1200px) { .related-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
        @media (max-width: 992px) { .related-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (max-width: 576px) { .related-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<!-- ── Header Fragment ── -->
<div th:replace="fragments/header :: header"></div>

<!-- ── Breadcrumb Navigation ── -->
<div class="breadcrumb-area py-3">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb bg-transparent mb-0 px-0">
                <li class="breadcrumb-item"><a th:href="@{/index}"><i class="fas fa-home mr-1"></i>Home</a></li>
                <li class="breadcrumb-item"><a th:href="@{/products}">Products</a></li>
                <li class="breadcrumb-item">
                    <a th:href="@{/products/category/{id}(id=${product.category.categoryId})}"
                       th:text="${product.category.categoryName}">Category</a>
                </li>
                <li class="breadcrumb-item active" aria-current="page" th:text="${product.title}">Product Title</li>
            </ol>
        </nav>
    </div>
</div>

<!-- ── Product Detail Section ── -->
<div class="container py-4">
    <div class="row">

        <!-- Left: Product Image -->
        <div class="col-lg-5 col-md-6 mb-4">
            <div class="product-detail-img">
                <!-- Show primary image if available, otherwise placeholder -->
                <img th:if="${product.images != null and !#lists.isEmpty(product.images)}"
                     th:src="${product.images.get(0).imageUrl}" alt="Product Image">
                <img th:if="${product.images == null or #lists.isEmpty(product.images)}"
                     th:src="@{/img/productplaceholder.png}" alt="Product Image">
            </div>
        </div>

        <!-- Right: Product Info -->
        <div class="col-lg-7 col-md-6">
            <div class="product-info-card">

                <!-- Product Title -->
                <h1 class="product-detail-title" th:text="${product.title}">Product Title</h1>

                <!-- Rating Stars (static placeholder) -->
                <div class="detail-rating mt-2">
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star-half-alt"></i>
                    <span style="color:#999; font-size:13px; margin-left:8px;">(No reviews yet)</span>
                </div>

                <!-- Price -->
                <div class="product-detail-price" th:text="'RM ' + ${#numbers.formatDecimal(product.price, 1, 2)}">RM 0.00</div>

                <!-- Badges: condition, category, stock -->
                <div class="info-badges">
                    <span class="badge-condition" th:text="${product.condition}">NEW</span>
                    <span class="badge-category">
                        <i class="fas fa-tag mr-1"></i>
                        <span th:text="${product.category.categoryName}">Category</span>
                    </span>
                    <!-- Stock badge with conditional styling -->
                    <span class="stock-badge stock-in" th:if="${product.quantity > 5}"
                          th:text="'In Stock (' + ${product.quantity} + ')'">In Stock</span>
                    <span class="stock-badge stock-low" th:if="${product.quantity > 0 and product.quantity <= 5}"
                          th:text="'Low Stock (' + ${product.quantity} + ' left)'">Low Stock</span>
                    <span class="stock-badge stock-out" th:if="${product.quantity == 0}">Out of Stock</span>
                </div>

                <div class="detail-divider"></div>

                <!-- Description -->
                <div th:if="${product.description != null and !product.description.isEmpty()}">
                    <h6 style="font-weight:700; color:#2b2b37;"><i class="fas fa-align-left mr-2" style="color:#ffb347;"></i>Description</h6>
                    <p class="product-description" th:text="${product.description}">Product description goes here.</p>
                </div>
                <div th:if="${product.description == null or product.description.isEmpty()}">
                    <p class="product-description" style="font-style:italic; color:#aaa;">No description provided.</p>
                </div>

                <div class="detail-divider"></div>

                <!-- Add to Cart Button -->
                <div class="d-flex align-items-center gap-3 mt-3">
                    <button class="btn-add-cart" type="button" id="detail-add-cart-btn"
                            th:disabled="${product.quantity == 0}"
                            th:data-product-id="${product.productId}">
                        <i class="fas fa-cart-plus mr-2"></i>Add to Cart
                    </button>
                    <!-- Feedback message shown after adding -->
                    <span id="detail-cart-msg" style="font-weight:600; font-size:14px; margin-left:12px; display:none;"></span>
                </div>

                <!-- Seller Info Card -->
                <div class="seller-card d-flex align-items-center">
                    <div class="seller-avatar mr-3">
                        <!-- Show first letter of seller's first name -->
                        <span th:text="${product.seller.user.firstName != null ? product.seller.user.firstName.substring(0,1).toUpperCase() : 'S'}">S</span>
                    </div>
                    <div>
                        <div class="seller-label"><i class="fas fa-store mr-1"></i>Sold by</div>
                        <div class="seller-name"
                             th:text="${(product.seller.user.firstName != null ? product.seller.user.firstName : '') + ' ' + (product.seller.user.lastName != null ? product.seller.user.lastName : '')}">
                            Seller Name
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ── Related Products Section ("You May Also Like") ── -->
<div class="container pb-5" th:if="${relatedProducts != null and !#lists.isEmpty(relatedProducts)}">
    <div class="detail-divider mb-4"></div>
    <h4 class="related-section-title mb-4">
        <i class="fas fa-heart"></i>
        <span>You May Also Like</span>
    </h4>
    <div class="related-grid">
        <div th:each="p : ${relatedProducts}">
            <div th:replace="fragments/product-card :: card(${p})"></div>
        </div>
    </div>
</div>

<!-- ── Footer Fragment ── -->
<div th:replace="fragments/footer :: footer"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.min.js"></script>

<!-- Handles the Add to Cart button click on the product detail page. -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('detail-add-cart-btn');
        if (!btn) return;

        btn.addEventListener('click', function() {
            var productId = btn.getAttribute('data-product-id');
            var msgEl = document.getElementById('detail-cart-msg');
            var originalHTML = btn.innerHTML;

            // Show loading state on the button.
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Adding...';
            msgEl.style.display = 'none';

            fetch('/cart/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'productId=' + productId + '&quantity=1'
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    // Update header cart badge.
                    var badges = document.querySelectorAll('.cart-badge-count');
                    badges.forEach(function(b) { b.textContent = data.cartCount; });
                    // Show success feedback.
                    btn.innerHTML = '<i class="fas fa-check mr-2"></i>Added!';
                    msgEl.textContent = data.message;
                    msgEl.style.color = '#28a745';
                    msgEl.style.display = 'inline';
                    // Reset button after 2 seconds.
                    setTimeout(function() { btn.innerHTML = originalHTML; btn.disabled = false; msgEl.style.display = 'none'; }, 2000);
                } else if (data.redirect) {
                    // User not logged in — redirect to login.
                    window.location.href = data.redirect;
                } else {
                    // Show error message.
                    msgEl.textContent = data.message || 'Could not add to cart.';
                    msgEl.style.color = '#C4161C';
                    msgEl.style.display = 'inline';
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                }
            })
            .catch(function() {
                msgEl.textContent = 'Something went wrong.';
                msgEl.style.color = '#C4161C';
                msgEl.style.display = 'inline';
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            });
        });
    });
</script>
</body>
</html>
