<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link th:href="@{/css/style.css}" rel="stylesheet" />
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<div class="container" style="padding:24px;">
    <h2 style="margin-bottom:8px;">My Profile</h2>
    <p style="margin-top:0;color:#6b7280;">Manage your profile, address, and orders. Seller features will be available from here.</p>

    <div style="margin-top:16px;padding:16px;border:1px solid rgba(0,0,0,0.08);border-radius:12px;max-width:720px;">
        <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;">
            <div>
                <div style="font-weight:700;">Name</div>
                <div th:text="${session.userName}">User</div>
            </div>
            <div>
                <div style="font-weight:700;">Account</div>
                <div th:text="${session.userId}">0</div>
            </div>
        </div>

        <hr style="margin:16px 0;">

        <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <a class="btn btn-primary" th:href="@{/buyer/orders.html}" style="text-decoration:none;">My Orders</a>
            <a class="btn btn-outline-primary" th:href="@{/user/seller}" style="text-decoration:none;">Seller Page</a>
        </div>

        <div style="margin-top:12px;color:#6b7280;font-size:14px;">
            To start selling, you’ll request verification from the Seller Page.
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
