<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Chat</title>
    <link th:href="@{/css/style.css}" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body{background:#f5f6fb}
        .chat-shell{max-width:980px;margin:24px auto;padding:0 12px}
        .chat-card{background:#fff;border-radius:18px;box-shadow:0 12px 24px rgba(15,23,42,0.08);border:1px solid rgba(15,23,42,0.06)}
        .chat-header{padding:18px 20px;border-bottom:1px solid rgba(15,23,42,0.06)}
        .chat-body{padding:18px 20px;min-height:420px;max-height:60vh;overflow:auto;background:linear-gradient(180deg,#ffffff 0%,#f8f9ff 100%)}
        .message-row{display:flex;margin-bottom:14px}
        .message-row.mine{justify-content:flex-end}
        .bubble{max-width:72%;padding:12px 14px;border-radius:16px;background:#eef1f7}
        .message-row.mine .bubble{background:#4B2E83;color:#fff}
        .sender{font-size:12px;font-weight:700;margin-bottom:4px}
        .meta{font-size:11px;opacity:.7;margin-top:6px}
        .chat-form{padding:18px 20px;border-top:1px solid rgba(15,23,42,0.06)}
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="chat-shell">
    <div class="chat-card">
        <div class="chat-header d-flex justify-content-between align-items-start gap-3 flex-wrap">
            <div>
                <h4 class="mb-1">Product Chat</h4>
                <div class="text-muted">
                    <span th:text="${orderItem.product.title}">Product</span>
                    <span> • Order Item #</span><span th:text="${orderItem.orderItemId}">1</span>
                </div>
            </div>
            <button type="button" class="btn btn-outline-secondary" onclick="window.history.back()">
                <i class="bi bi-arrow-left"></i> Back
            </button>
        </div>

        <div class="chat-body" id="chatMessages">
            <div th:if="${#lists.isEmpty(messages)}" class="text-center text-muted py-5">
                No messages yet. Start the conversation for this product.
            </div>
            <div th:each="message : ${messages}" class="message-row" th:classappend="${message.senderId == currentUserId} ? ' mine' : ''">
                <div class="bubble">
                    <div class="sender" th:text="${message.senderName}">Sender</div>
                    <div th:text="${message.message}">Message</div>
                    <div class="meta" th:text="${#temporals.format(message.sentAt, 'dd MMM yyyy hh:mm a')}">Date</div>
                </div>
            </div>
        </div>

        <div class="chat-form">
            <div class="alert alert-danger d-none" id="chatError"></div>
            <form id="chatSendForm" class="row g-2" th:attr="data-send-url=@{/chat/send}">
                <input type="hidden" name="chatId" th:value="${chat.chatId}" />
                <div class="col-12 col-md-9">
                    <input type="text" name="message" class="form-control" maxlength="1000" placeholder="Type your message..." required />
                </div>
                <div class="col-12 col-md-3 d-grid">
                    <button type="submit" class="btn btn-primary">Send</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:inline="javascript">
    (function () {
        const form = document.getElementById('chatSendForm');
        const messagesBox = document.getElementById('chatMessages');
        const errorBox = document.getElementById('chatError');
        if (!form || !messagesBox) return;
        const sendUrl = form.getAttribute('data-send-url');

        function escapeHtml(value) {
            return value.replace(/[&<>"']/g, function (char) {
                return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[char];
            });
        }

        form.addEventListener('submit', async function (event) {
            event.preventDefault();
            errorBox.classList.add('d-none');
            const formData = new FormData(form);

            try {
                const response = await fetch(sendUrl, {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });
                const payload = await response.json();
                if (!response.ok || payload.error) {
                    throw new Error(payload.error || 'Failed to send message.');
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'message-row mine';
                wrapper.innerHTML = `
                    <div class="bubble">
                        <div class="sender">${escapeHtml(payload.senderName)}</div>
                        <div>${escapeHtml(payload.message)}</div>
                        <div class="meta">${new Date(payload.sentAt).toLocaleString()}</div>
                    </div>`;

                const emptyState = messagesBox.querySelector('.text-center.text-muted');
                if (emptyState) emptyState.remove();

                messagesBox.appendChild(wrapper);
                messagesBox.scrollTop = messagesBox.scrollHeight;
                form.reset();
            } catch (error) {
                errorBox.textContent = error.message;
                errorBox.classList.remove('d-none');
            }
        });
    })();
</script>
</body>
</html>
