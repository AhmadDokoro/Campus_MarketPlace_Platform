<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Campus Marketplace</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body{background:linear-gradient(180deg,#f9fafb 0%,#fff 45%,#f6f3ff 100%);font-family:'Poppins',sans-serif}
        .breadcrumb-area{background:rgba(75,46,131,0.04);border-bottom:1px solid rgba(75,46,131,0.08)}
        .breadcrumb-area a{color:#4B2E83;font-weight:500}
        .breadcrumb-area a:hover{color:#ffb347;text-decoration:none}
        .checkout-title{font-size:28px;font-weight:700;color:#2b2b37}
        .checkout-title i{color:#ffb347}

        .checkout-card{background:#fff;border-radius:18px;padding:28px;box-shadow:0 8px 28px rgba(17,24,39,0.06);margin-bottom:20px}
        .checkout-card h5{font-weight:700;color:#2b2b37;font-size:18px;margin-bottom:20px}
        .checkout-card h5 i{color:#ffb347;margin-right:8px}

        /* Order items mini list */
        .checkout-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid rgba(75,46,131,0.06)}
        .checkout-item:last-child{border-bottom:none}
        .checkout-item-img{width:60px;height:60px;border-radius:10px;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
        .checkout-item-img img{width:100%;height:100%;object-fit:cover}
        .checkout-item-title{font-weight:600;font-size:14px;color:#2b2b37}
        .checkout-item-meta{font-size:12px;color:#888}
        .checkout-item-price{font-weight:700;color:#4B2E83;font-size:15px;white-space:nowrap}

        /* Payment method cards */
        .pm-option{border:2px solid rgba(75,46,131,0.1);border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .25s ease;margin-bottom:12px}
        .pm-option:hover{border-color:rgba(75,46,131,0.3);background:rgba(75,46,131,0.02)}
        .pm-option.selected{border-color:#4B2E83;background:rgba(75,46,131,0.04);box-shadow:0 4px 16px rgba(75,46,131,0.12)}
        .pm-option .pm-title{font-weight:700;color:#2b2b37;font-size:15px}
        .pm-option .pm-desc{font-size:12px;color:#888;margin-top:2px}
        .pm-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;margin-right:16px}
        .pm-icon-meetup{background:rgba(40,167,69,0.1);color:#28a745}
        .pm-icon-online{background:rgba(75,46,131,0.1);color:#4B2E83}

        /* Summary section */
        .summary-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;color:#555}
        .summary-total{display:flex;justify-content:space-between;padding:16px 0 0;font-size:22px;font-weight:800;color:#4B2E83;border-top:2px solid rgba(75,46,131,0.08)}

        /* Place order button */
        .btn-place-order{
            background:linear-gradient(135deg,rgba(75,46,131,0.92) 0%,rgba(255,179,71,0.95) 100%);
            color:#fff;border:none;padding:16px;width:100%;border-radius:999px;font-weight:700;font-size:16px;
            box-shadow:0 12px 28px rgba(255,179,71,0.35),0 0 20px rgba(75,46,131,0.25);
            transition:transform .25s ease,box-shadow .25s ease;animation:glowPulse 2.5s ease-in-out infinite}
        .btn-place-order:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 16px 32px rgba(255,179,71,0.45),0 0 26px rgba(75,46,131,0.35);color:#fff}
        @keyframes glowPulse{0%,100%{box-shadow:0 12px 28px rgba(255,179,71,0.35),0 0 20px rgba(75,46,131,0.25)}50%{box-shadow:0 14px 32px rgba(255,179,71,0.5),0 0 28px rgba(75,46,131,0.35)}}

        .alert-danger{border-radius:12px;font-weight:500}
    </style>
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<!-- Breadcrumb -->
<div class="breadcrumb-area py-3">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb bg-transparent mb-0 px-0">
                <li class="breadcrumb-item"><a th:href="@{/index}"><i class="fas fa-home mr-1"></i>Home</a></li>
                <li class="breadcrumb-item"><a th:href="@{/cart}">Cart</a></li>
                <li class="breadcrumb-item active">Checkout</li>
            </ol>
        </nav>
    </div>
</div>

<div class="container py-4">
    <h2 class="checkout-title mb-4"><i class="bi bi-bag-check mr-2"></i>Checkout</h2>

    <!-- Error alert -->
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <form method="post" th:action="@{/orders/place}" id="checkout-form">
        <div class="row">

            <!-- Left: Order Items + Payment Method -->
            <div class="col-lg-8">

                <!-- Order Items Summary -->
                <div class="checkout-card">
                    <h5><i class="bi bi-box-seam"></i>Order Items <span style="font-size:13px;color:#999;font-weight:400" th:text="'(' + ${itemCount} + ' items)'"></span></h5>
                    <div th:each="item : ${cartItems}" class="checkout-item">
                        <div class="checkout-item-img mr-3">
                            <img th:if="${item.product.images != null and !#lists.isEmpty(item.product.images)}" th:src="${item.product.images.get(0).imageUrl}" alt="">
                            <img th:if="${item.product.images == null or #lists.isEmpty(item.product.images)}" th:src="@{/img/productplaceholder.png}" alt="">
                        </div>
                        <div class="flex-grow-1">
                            <div class="checkout-item-title" th:text="${item.product.title}">Product</div>
                            <div class="checkout-item-meta" th:text="'Qty: ' + ${item.quantity}">Qty: 1</div>
                        </div>
                        <div class="checkout-item-price" th:text="'RM ' + ${#numbers.formatDecimal(item.product.price * item.quantity, 1, 2)}">RM 0.00</div>
                    </div>
                </div>

                <!-- Payment Method Selection -->
                <div class="checkout-card">
                    <h5><i class="bi bi-credit-card"></i>Payment Method</h5>

                    <!-- Cash on Delivery Option -->
                    <label class="pm-option d-flex align-items-center selected" id="pm-cod" onclick="selectPM('CASH_ON_DELIVERY')">
                        <div class="pm-icon pm-icon-meetup"><i class="bi bi-cash-stack"></i></div>
                        <div class="flex-grow-1">
                            <div class="pm-title"><i class="fas fa-money-bill-wave mr-1"></i>Cash on Delivery</div>
                            <div class="pm-desc">Pay in cash when you receive the item on campus</div>
                        </div>
                        <input type="radio" name="paymentMethod" value="CASH_ON_DELIVERY" checked style="display:none">
                    </label>

                    <!-- Online Payment Option -->
                    <label class="pm-option d-flex align-items-center" id="pm-online" onclick="selectPM('ONLINE_PAYMENT')">
                        <div class="pm-icon pm-icon-online"><i class="bi bi-shield-lock-fill"></i></div>
                        <div class="flex-grow-1">
                            <div class="pm-title"><i class="fas fa-credit-card mr-1"></i>Online Payment</div>
                            <div class="pm-desc">Pay securely via ToyyibPay (Card / FPX)</div>
                        </div>
                        <input type="radio" name="paymentMethod" value="ONLINE_PAYMENT" style="display:none">
                    </label>
                </div>
            </div>

            <!-- Right: Order Summary -->
            <div class="col-lg-4">
                <div class="checkout-card" style="position:sticky;top:24px">
                    <h5><i class="bi bi-receipt"></i>Order Summary</h5>
                    <div class="summary-row"><span>Items</span><span th:text="${itemCount}">0</span></div>
                    <div class="summary-row"><span>Subtotal</span><span th:text="'RM ' + ${#numbers.formatDecimal(cartTotal, 1, 2)}">RM 0.00</span></div>
                    <div class="summary-row"><span>Delivery</span><span style="color:#28a745;font-weight:600">Free</span></div>
                    <div class="summary-total"><span>Total</span><span th:text="'RM ' + ${#numbers.formatDecimal(cartTotal, 1, 2)}">RM 0.00</span></div>

                    <button type="submit" class="btn-place-order mt-4" id="btn-place">
                        <i class="bi bi-lock-fill mr-2"></i>Place Order
                    </button>
                    <a th:href="@{/cart}" class="d-block text-center mt-3" style="color:#4B2E83;font-weight:600;font-size:14px;text-decoration:none">
                        <i class="fas fa-arrow-left mr-1"></i>Back to Cart
                    </a>
                </div>
            </div>
        </div>
    </form>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.min.js"></script>
<script>
    // Toggles the payment method selection UI and updates the hidden radio.
    function selectPM(method) {
        document.querySelectorAll('.pm-option').forEach(function(el) { el.classList.remove('selected'); });
        if (method === 'CASH_ON_DELIVERY') {
            document.getElementById('pm-cod').classList.add('selected');
            document.querySelector('input[value="CASH_ON_DELIVERY"]').checked = true;
        } else {
            document.getElementById('pm-online').classList.add('selected');
            document.querySelector('input[value="ONLINE_PAYMENT"]').checked = true;
        }
    }

    // Prevent double-submit on the place order button.
    document.getElementById('checkout-form').addEventListener('submit', function() {
        var btn = document.getElementById('btn-place');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Processing...';
    });
</script>
</body>
</html>
