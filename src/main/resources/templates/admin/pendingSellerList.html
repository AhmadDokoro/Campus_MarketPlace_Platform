<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending Sellers — Admin</title>
  <link th:href="@{/css/style.css}" rel="stylesheet" />
  <style>
    /* Modernized styles for pending sellers page */
    :root{--bg:#f4f6fb;--card:#ffffff;--muted:#6b7280;--accent:#F2B705;--accent-2:#4B2E83}
    body{font-family:Inter,system-ui,Arial;background:var(--bg);margin:24px}
    .page-wrap{max-width:1100px;margin:0 auto}
    .header-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
    .title-wrap h1{margin:0;font-size:22px;letter-spacing:-0.2px}
    .title-wrap .sub{color:var(--muted);font-size:0.95rem;margin-top:6px}

    .back-btn{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#fff;padding:10px 14px;border-radius:10px;border:none;font-weight:700;cursor:pointer;text-decoration:none;box-shadow:0 8px 24px rgba(75,46,131,0.08);transition:transform .12s ease}
    .back-btn:hover{transform:translateY(-2px)}

    .card{background:var(--card);padding:18px;border-radius:14px;box-shadow:0 10px 30px rgba(21,24,35,0.06)}
    .small{font-size:0.95rem;color:var(--muted)}

    table{width:100%;border-collapse:separate;border-spacing:0 10px}
    thead th{font-weight:700;text-align:left;padding:10px 12px;color:#374151;font-size:0.95rem}
    tbody tr{background:#fff;border-radius:10px;box-shadow:0 6px 18px rgba(15,23,42,0.04);cursor:pointer}
    tbody td{padding:14px 12px;vertical-align:middle}
    tbody tr:hover{transform:translateY(-4px);transition:transform .15s ease;background:linear-gradient(90deg,#ffffff,#fbfbff)}

    .name-cell{display:flex;align-items:center;gap:12px}
    .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#4B2E83,#F2B705);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700}

    .badge-pending{background:#F2B705;color:#4B2E83;padding:6px 10px;border-radius:999px;font-weight:700}

    @media (max-width:720px){
      .header-row{flex-direction:column;align-items:flex-start}
      thead th:nth-child(5), tbody td:nth-child(5){display:none}
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="header-row">
      <div class="title-wrap">
        <h1>Pending Seller Verification</h1>
        <div class="sub">Review submitted seller verification requests and open details to approve or reject.</div>
      </div>
      <a th:href="@{/admin/dashboard}" class="back-btn">← Back to Dashboard</a>
    </div>

    <div class="card">
      <p class="small">Click a row to open the seller details and review.</p>

      <!-- show error if controller passed one -->
      <div th:if="${error}" class="error" th:text="${error}" style="margin-top:12px;background:#fff3f2;color:#b45309;padding:10px;border-radius:8px"></div>

      <!-- Table of sellers - sellers injected into model by AdminController -->
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Academic ID</th>
            <th>Submitted</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="seller,iterStat : ${sellers}" th:onclick="|window.location='@{/admin/getSellerDetailsForReview(sellerId=${seller.sellerId})}'|">
            <td th:text="${iterStat.count}"></td>
            <td>
              <div class="name-cell">
                <div class="avatar" th:text="${seller.user != null ? seller.user.firstName.substring(0,1).toUpperCase() : 'U'}"></div>
                <div>
                  <div th:text="${seller.user != null ? (seller.user.firstName + ' ' + seller.user.lastName) : 'Unknown'}"></div>
                  <div style="font-size:0.85rem;color:var(--muted);" th:text="${seller.user != null ? seller.user.level : ''}"></div>
                </div>
              </div>
            </td>
            <td th:text="${seller.user != null ? seller.user.email : '—'}"></td>
            <td th:text="${seller.user != null ? seller.user.academicId : '—'}"></td>
            <!-- Use #temporals.format for java.time.LocalDateTime -->
            <td th:text="${seller.submittedAt != null ? #temporals.format(seller.submittedAt, 'dd MMM yyyy HH:mm') : '—'}"></td>
            <td><span class="badge-pending">Pending</span></td>
          </tr>
          <tr th:if="${#lists.isEmpty(sellers)}"><td colspan="6" style="padding:22px;text-align:center;color:#6b7280">No pending sellers</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
