<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Seller Application Rejected</title>
  <link th:href="@{/css/authentication.css}" rel="stylesheet" />
  <style>
    :root{--bg:#f8f7fb;--card:#fff;--primary:#4B2E83;--accent:#F2B705;--muted:#6b7280}
    body{margin:0;font-family:Inter,system-ui,Arial;background:var(--bg)}
    .center-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 80px);padding:24px}
    .panel{background:var(--card);border-radius:12px;padding:28px;max-width:680px;box-shadow:0 14px 36px rgba(15,23,42,0.08);text-align:center}
    .panel h2{color:var(--primary);margin-bottom:8px;font-size:22px}
    .panel p{color:var(--muted);margin-bottom:20px;font-size:15px}
    .actions{display:flex;gap:12px;align-items:center;justify-content:center;margin-top:18px}
    .btn-primary{background:var(--primary);color:#fff;padding:10px 18px;border-radius:10px;border:none;font-weight:700;text-decoration:none}
    .btn-ghost{background:transparent;border:1px solid rgba(15,23,42,0.06);padding:9px 14px;border-radius:10px}
    .reason{margin-top:10px;color:#C4161C;font-weight:700}
    .logo-small{height:36px;display:block;margin:0 auto 12px}
    @media (max-width:720px){.panel{padding:20px}}
  </style>
</head>
<body>
  <div class="center-wrap">
    <div class="panel">
      <img th:src="@{/img/umtlogo.png}" alt="UMT" class="logo-small" />
      <h2>Application Rejected</h2>
      <p th:text="${rejectionMessage != null} ? ${rejectionMessage} : 'Your seller application was rejected by the admin. If you believe this is a mistake, please re-register.'"></p>

      <div class="reason">If you received an email, check it for the rejection reason.</div>

      <div class="actions">
        <!-- OK: send user to registration page as requested -->
        <a th:href="@{/registerUser}" class="btn-primary">OK - Re-register</a>
        <a th:href="@{/signin}" class="btn-ghost">Back to login</a>
      </div>
    </div>
  </div>
</body>
</html>
