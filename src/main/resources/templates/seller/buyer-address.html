<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Address</title>
    <link th:href="@{/css/style.css}" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="mb-1">Buyer Address</h3>
            <p class="text-muted mb-0" th:text="'Order Item #' + ${orderItemId}">Order item</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/seller/orders}">Back to Seller Orders</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <div th:if="${error != null}" class="alert alert-danger" th:text="${error}">Error</div>

            <div th:if="${buyerAddress != null}">
                <div class="mb-3"><strong>Hostel Block:</strong> <span th:text="${buyerAddress.hostelBlock != null ? buyerAddress.hostelBlock : 'N/A'}">N/A</span></div>
                <div class="mb-3"><strong>Floor:</strong> <span th:text="${buyerAddress.floor != null ? buyerAddress.floor : 'N/A'}">N/A</span></div>
                <div class="mb-3"><strong>Room Number:</strong> <span th:text="${buyerAddress.roomNumber != null ? buyerAddress.roomNumber : 'N/A'}">N/A</span></div>
                <div class="mb-3"><strong>City:</strong> <span th:text="${buyerAddress.city != null ? buyerAddress.city : 'N/A'}">N/A</span></div>
                <div class="mb-0"><strong>State:</strong> <span th:text="${buyerAddress.state != null ? buyerAddress.state : 'N/A'}">N/A</span></div>
            </div>

            <div th:if="${buyerAddress == null and error == null}" class="text-muted">
                Buyer address is not available for this order item.
            </div>
        </div>
    </div>
</main>
</body>
</html>
